<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chào mừng - Nông nghiệp Việt Sang</title>
    <!-- Icon & Font -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="reset.css" />
    <link rel="stylesheet" href="style.css" />
    <!-- icon -->
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="./assets/picture/favicon_io/apple-touch-icon.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/picture/favicon_io/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="./assets/picture/favicon_io/favicon-16x16.png"
    />
    <link rel="manifest" href="./assets/picture/favicon_io/site.webmanifest" />

    <style>
      body.welcome-page {
        background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0;
        padding: 20px;
        font-family: "Be Vietnam Pro", sans-serif;
      }

      .welcome-card {
        background: #ffffff;
        width: 100%;
        max-width: 600px;
        padding: 50px 40px;
        border-radius: 20px;
        box-shadow: 0 20px 40px rgba(45, 90, 39, 0.1);
        text-align: center;
        animation: popUp 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      }

      @keyframes popUp {
        0% {
          transform: scale(0.8);
          opacity: 0;
        }
        100% {
          transform: scale(1);
          opacity: 1;
        }
      }

      .welcome-logo {
        height: 80px;
        margin-bottom: 20px;
        animation: float 3s ease-in-out infinite;
      }

      @keyframes float {
        0% {
          transform: translateY(0px);
        }
        50% {
          transform: translateY(-10px);
        }
        100% {
          transform: translateY(0px);
        }
      }

      .welcome-title {
        color: var(--leaf-green);
        font-size: 2rem;
        font-weight: 800;
        margin-bottom: 10px;
      }

      .welcome-subtitle {
        color: #666;
        font-size: 1.1rem;
        margin-bottom: 40px;
      }

      .role-selection {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
      }

      @media (max-width: 500px) {
        .role-selection {
          grid-template-columns: 1fr;
        }
      }

      .role-btn {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 30px 20px;
        border-radius: 16px;
        text-decoration: none;
        transition: all 0.3s ease;
        border: 2px solid transparent;
      }

      /* Nút cho Bà con nông dân */
      .btn-farmer {
        background: #f0f7f0;
        color: var(--leaf-green);
        border-color: #dcedc8;
      }
      .btn-farmer i {
        font-size: 3rem;
        color: var(--sprout-green);
        margin-bottom: 15px;
        transition: 0.3s;
      }
      .btn-farmer:hover {
        background: var(--sprout-green);
        color: white;
        transform: translateY(-5px);
        box-shadow: 0 10px 20px rgba(76, 175, 80, 0.2);
      }
      .btn-farmer:hover i {
        color: white;
      }

      /* Nút cho Admin */
      .btn-admin {
        background: #fff8e1;
        color: #d84315;
        border-color: #ffecb3;
      }
      .btn-admin i {
        font-size: 3rem;
        color: var(--accent-orange);
        margin-bottom: 15px;
        transition: 0.3s;
      }
      .btn-admin:hover {
        background: var(--accent-orange);
        color: white;
        transform: translateY(-5px);
        box-shadow: 0 10px 20px rgba(255, 152, 0, 0.2);
      }
      .btn-admin:hover i {
        color: white;
      }

      .role-name {
        font-size: 1.2rem;
        font-weight: 700;
      }
    </style>
  </head>

  <body class="welcome-page">
    <div class="welcome-card">
      <img
        src="./assets/picture/logo.png"
        alt="Logo Việt Sang"
        class="welcome-logo"
      />
      <h1 class="welcome-title">Xin chào!</h1>
      <p class="welcome-subtitle">
        Để chúng tôi phục vụ tốt nhất, xin cho biết bạn là ai nhé?
      </p>

      <div class="role-selection">
        <!-- Chuyển hướng sang trang chủ -->
        <a href="trang-chu.html" class="role-btn btn-farmer">
          <i class="fa-solid fa-wheat-awn"></i>
          <span class="role-name">Bà con Nông dân</span>
        </a>

        <!-- Chuyển hướng sang trang đăng nhập Admin -->
        <a href="login.html" class="role-btn btn-admin">
          <i class="fa-solid fa-user-shield"></i>
          <span class="role-name">Quản trị viên</span>
        </a>
      </div>
    </div>
  </body>
</html>
