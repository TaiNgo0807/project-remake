<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hoạt Động Thực Tế - Nông nghiệp Việt Sang</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- icon -->
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="./assets/picture/favicon_io/apple-touch-icon.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/picture/favicon_io/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="./assets/picture/favicon_io/favicon-16x16.png"
    />
    <link rel="manifest" href="./assets/picture/favicon_io/site.webmanifest" />
    <link rel="stylesheet" href="reset.css" />
    <link rel="stylesheet" href="style.css" />

    <style>
      body.activities-page {
        background-color: var(--field-bg);
        padding-top: 80px;
      }

      .activities-header {
        text-align: center;
        padding: 40px 20px 20px;
      }

      .activity-feed {
        max-width: 900px;
        margin: 0 auto;
        padding: 0 20px 60px;
      }

      .activity-card {
        background: #fff;
        border-radius: 12px;
        box-shadow: 0 8px 25px rgba(0, 0, 0, 0.06);
        padding: 30px;
        margin-bottom: 40px;
        border-top: 4px solid var(--sprout-green);
        transition: transform 0.3s ease;
      }

      .activity-card:hover {
        transform: translateY(-5px);
      }

      .act-title {
        color: var(--leaf-green);
        font-size: 1.6rem;
        font-weight: 700;
        margin-bottom: 10px;
      }

      .act-meta {
        color: #777;
        font-size: 0.9rem;
        margin-bottom: 15px;
      }

      .act-meta i {
        color: var(--accent-orange);
        margin-right: 5px;
      }

      .act-desc {
        color: #444;
        line-height: 1.6;
        font-size: 1.05rem;
        margin-bottom: 20px;
        text-align: justify;
      }

      /* Lưới 5 ảnh phong cách Album Zalo/Facebook */
      .gallery-5 {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        grid-template-rows: repeat(2, 220px);
        gap: 8px;
        border-radius: 12px;
        overflow: hidden;
      }

      .img-wrap {
        overflow: hidden;
        position: relative;
        cursor: pointer;
      }

      .img-wrap img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform 0.4s ease;
      }

      .img-wrap:hover img {
        transform: scale(1.1);
      }

      /* Set vị trí cho 5 ảnh */
      .gi-1 {
        grid-column: 1 / 3;
        grid-row: 1 / 3;
      } /* Ảnh 1 to chà bá bên trái */
      .gi-2 {
        grid-column: 3 / 4;
        grid-row: 1 / 2;
      } /* Ảnh 2 trên giữa */
      .gi-3 {
        grid-column: 4 / 5;
        grid-row: 1 / 2;
      } /* Ảnh 3 trên phải */
      .gi-4 {
        grid-column: 3 / 4;
        grid-row: 2 / 3;
      } /* Ảnh 4 dưới giữa */
      .gi-5 {
        grid-column: 4 / 5;
        grid-row: 2 / 3;
      } /* Ảnh 5 dưới phải */

      /* Responsive cho điện thoại: rớt xuống 2 cột */
      @media (max-width: 768px) {
        .gallery-5 {
          grid-template-columns: repeat(2, 1fr);
          grid-template-rows: auto;
        }
        .gi-1 {
          grid-column: 1 / 3;
          grid-row: 1;
          height: 250px;
        }
        .img-wrap {
          height: 150px;
        } /* Cố định chiều cao 4 ảnh nhỏ */
      }

      @media (max-width: 480px) {
        .activity-card {
          padding: 20px;
        }
        .act-title {
          font-size: 1.3rem;
        }
      }
    </style>
  </head>

  <body class="activities-page">
    <div
      class="header"
      id="header"
      style="background: white; box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1)"
    >
      <div class="nav-container">
        <a href="/" class="logo">
          <img src="./assets/picture/logo.png" alt="Logo" height="40" />
          <h1>Nông nghiệp Việt Sang</h1>
        </a>
        <ul class="nav-menu">
          <li><a href="/" class="nav-link">Trang chủ</a></li>
          <li><a href="/san-pham" class="nav-link">Sản Phẩm</a></li>
          <li><a href="/dai-ly" class="nav-link">Đại lý</a></li>
          <li>
            <a href="/bai-viet-ky-thuat" class="nav-link">Thông tin kỹ thuật</a>
          </li>
          <li><a href="/gioi-thieu" class="nav-link">Về chúng tôi</a></li>
          <li>
            <a href="/hoat-dong" class="nav-link">Hoạt động thực tế</a>
          </li>
          <li><a href="/tuyen-dung" class="nav-link">Tuyển dụng</a></li>
        </ul>
      </div>
    </div>

    <!-- Tiêu đề trang -->
    <div class="activities-header">
      <h2 class="title">Nhật Ký Đồng Ruộng</h2>
      <p style="color: #666; margin-top: 10px">
        Những dấu chân của Việt Sang trên mọi miền đất nước.
      </p>
    </div>

    <!-- Danh sách hoạt động -->
    <section class="activity-feed">
      <!-- HOẠT ĐỘNG 1 -->
      <div class="activity-card"></div>
    </section>

    <script src="./config/config.js"></script>
    <script src="main.js"></script>
    <script src="toast.js"></script>
    <script src="activities.js"></script>
    <div class="fab-wrapper">
      <!-- Cụm các nút liên hệ (bị ẩn đi mặc định) -->
      <div class="fab-wheel">
        <!-- Nút Gọi điện -->
        <a href="tel:0987711284" class="fab-action fab-phone" title="Gọi ngay">
          <i class="fa-solid fa-phone"></i>
        </a>
        <!-- Nút Facebook -->
        <a
          href="https://www.facebook.com/NongNghiepVietSang2023"
          target="_blank"
          class="fab-action fab-fb"
          title="Facebook"
        >
          <i class="fa-brands fa-facebook-f"></i>
        </a>
        <!-- Nút TikTok -->
        <a
          href="https://www.tiktok.com/@nongnghiepvietsang1"
          target="_blank"
          class="fab-action fab-tiktok"
          title="TikTok"
        >
          <i class="fa-brands fa-tiktok"></i>
        </a>
        <!-- Nút YouTube -->
        <a
          href="https://www.youtube.com/@kythuatdongruong"
          target="_blank"
          class="fab-action fab-yt"
          title="YouTube"
        >
          <i class="fa-brands fa-youtube"></i>
        </a>
      </div>

      <!-- Nút 3 chấm chính -->
      <div class="fab-btn">
        <i class="fa-solid fa-ellipsis-vertical"></i>
      </div>
    </div>
  </body>
</html>
